<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Goblin Game</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"><script defer="defer" src="/DOM-goblins-game-2/bundle.09ddb7529a226667f024.js"></script></head><body><div class="container"><header class="header"><h1><i class="fas fa-gamepad"></i> Goblin Whack-a-Mole</h1><p class="subtitle">Catch the goblin before it disappears!</p></header><main class="main-content"><div class="game-info"><div class="score-board"><h2><i class="fas fa-chart-line"></i> Game Stats</h2><div class="stats"><div class="stat"><span class="stat-label">Score:</span> <span class="stat-value" id="scoreCount">0</span></div><div class="stat"><span class="stat-label">Misses:</span> <span class="stat-value" id="missCount">0</span></div></div></div><div class="instructions"><h2><i class="fas fa-info-circle"></i> How to Play</h2><ul><li>Goblin appears in random cells for exactly 1 second</li><li>Click the goblin with the hammer cursor to score points</li><li>Game ends after 5 misses</li></ul></div></div><div class="game-board-container"><h2><i class="fas fa-chess-board"></i> Game Board (4x4)</h2><div class="game-board" id="gameBoard"></div><p id="gameStatus" class="game-status">Press Start to begin</p><div class="controls"><button id="startBtn" class="btn btn-primary"><i class="fas fa-play"></i> Start Game</button> <button id="resetBtn" class="btn btn-danger"><i class="fas fa-redo"></i> Reset</button></div></div></main></div></body></html>
