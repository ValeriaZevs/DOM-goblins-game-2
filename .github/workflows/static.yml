name: Deploy Static Content

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Check for dist folder
        run: |
          if [ ! -d "dist" ]; then
            echo "❌ dist folder not found! Creating minimal version..."
            mkdir -p dist
            cat > dist/index.html << 'EOF'
            <!DOCTYPE html>
            <html>
            <head>
                <title>DOM Game - Static Version</title>
                <style>
                    body { font-family: Arial; text-align: center; padding: 50px; }
                    .board { 
                        display: grid; 
                        grid-template-columns: repeat(4, 1fr);
                        width: 400px; 
                        height: 400px;
                        margin: 20px auto;
                        border: 2px solid #333;
                    }
                    .cell { border: 1px solid #ccc; display: flex; align-items: center; justify-content: center; }
                    .goblin { font-size: 40px; }
                </style>
            </head>
            <body>
                <h1>🎮 Goblin Game (Static Build)</h1>
                <div class="board" id="board"></div>
                <p>Moves: <span id="moves">0</span></p>
                
                <script>
                    let moves = 0;
                    let currentCell = 0;
                    
                    const board = document.getElementById('board');
                    for (let i = 0; i < 16; i++) {
                        const cell = document.createElement('div');
                        cell.className = 'cell';
                        cell.id = 'cell' + i;
                        board.appendChild(cell);
                    }
                    
                    function moveGoblin() {
                        let newCell;
                        do {
                            newCell = Math.floor(Math.random() * 16);
                        } while (newCell === currentCell);
                        
                        if (currentCell !== null) {
                            document.getElementById('cell' + currentCell).innerHTML = '';
                        }
                        
                        const cell = document.getElementById('cell' + newCell);
                        const goblin = document.createElement('div');
                        goblin.className = 'goblin';
                        goblin.textContent = '👹';
                        cell.appendChild(goblin);
                        
                        currentCell = newCell;
                        moves++;
                        document.getElementById('moves').textContent = moves;
                    }
                    
                    document.addEventListener('DOMContentLoaded', () => {
                        moveGoblin();
                        setInterval(moveGoblin, 2000);
                    });
                </script>
            </body>
            </html>
            EOF
          else
            echo "✅ dist folder found"
            ls -la dist/
          fi
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
